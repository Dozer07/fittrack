<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FitTrack — тренировки</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><h3>FitTrack</h3></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-btn" id="navMain"><i class="fas fa-home"></i> Главная</a>
            <a href="workouts.html" class="sidebar-btn active" id="navWorkouts"><i class="fas fa-dumbbell"></i> Тренировки</a>
            <a href="profile.html" class="sidebar-btn" id="navProfile"><i class="fas fa-user"></i> Профиль</a>
            <a href="settings.html" class="sidebar-btn" id="navSettings"><i class="fas fa-cog"></i> Настройки</a>
            <a href="report.html" class="sidebar-btn" id="navReport"><i class="fas fa-chart-bar"></i> Отчёт</a>
            <button id="logoutBtn" class="sidebar-btn logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </nav>
    </aside>
    <main class="main-content">
        <div class="top-bar">
            <button id="langToggleBtn" class="lang-btn"><i class="fas fa-globe"></i> English</button>
            <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
        <div class="header">
            <h1 id="manageWorkoutsTitle">Управление тренировками</h1>
        </div>
        <div class="card" style="margin-bottom: 2rem;">
            <h2 id="addWorkoutTitle"><i class="fas fa-plus-circle"></i> Добавить тренировку</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <select id="presetWorkoutSelect">
                    <option value="" id="presetPlaceholder">-- Предустановленные --</option>
                    <option value="Силовая">Силовая</option>
                    <option value="Кардио">Кардио</option>
                    <option value="Интервальная">Интервальная</option>
                </select>
                <button id="addPresetWorkoutBtn">Добавить из пресета</button>
                <button id="showAddCustomBtn" class="btn-outline"><i class="fas fa-plus"></i> Своя тренировка</button>
            </div>
            <div id="customWorkoutForm" style="display:none; margin-bottom: 15px;">
                <input type="text" id="customWorkoutName" placeholder="Название">
                <input type="date" id="customWorkoutDate">
                <input type="number" id="customWorkoutDuration" placeholder="Мин" min="0">
                <input type="number" id="customWorkoutCalories" placeholder="Ккал" min="0">
                <select id="customWorkoutCategory"></select>
                <button id="newCategoryBtn" type="button" class="btn-outline" style="margin-top: 5px;">+ Новая категория</button>
                <button id="saveCustomWorkout">Сохранить</button>
            </div>
        </div>
        <div class="card">
            <h2 id="allWorkoutsTitle"><i class="fas fa-list"></i> Все тренировки</h2>
            <div class="table-wrapper">
                <table id="workoutsTable">
                    <thead><tr><th id="thName">Название</th><th id="thCategory">Категория</th><th id="thDate">Дата</th><th id="thDuration">Мин</th><th id="thCalories">Ккал</th><th id="thActions">Действия</th></tr></thead>
                    <tbody id="workoutsList"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FitTrack — профиль</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><h3>FitTrack</h3></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-btn" id="navMain"><i class="fas fa-home"></i> Главная</a>
            <a href="workouts.html" class="sidebar-btn" id="navWorkouts"><i class="fas fa-dumbbell"></i> Тренировки</a>
            <a href="profile.html" class="sidebar-btn active" id="navProfile"><i class="fas fa-user"></i> Профиль</a>
            <a href="settings.html" class="sidebar-btn" id="navSettings"><i class="fas fa-cog"></i> Настройки</a>
            <a href="report.html" class="sidebar-btn" id="navReport"><i class="fas fa-chart-bar"></i> Отчёт</a>
            <button id="logoutBtn" class="sidebar-btn logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </nav>
    </aside>
    <main class="main-content">
        <div class="top-bar">
            <button id="langToggleBtn" class="lang-btn"><i class="fas fa-globe"></i> English</button>
            <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
        <div class="header">
            <h1 id="editProfileTitle">Редактирование профиля</h1>
        </div>
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 id="personalDataTitle"><i class="fas fa-id-card"></i> Личные данные</h2>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="editName" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" placeholder="Email" disabled>
                <small id="emailCannotChange">Email нельзя изменить</small>
            </div>
            <div class="form-group">
                <label id="heightLabel">Рост (см)</label>
                <input type="number" id="editHeight" placeholder="Например: 175" min="0">
            </div>
            <div class="form-group">
                <label id="weightLabel">Вес (кг)</label>
                <input type="number" id="editWeight" placeholder="Например: 70" min="0">
            </div>
            <div class="flex-btns" style="margin-top: 20px;">
                <button id="saveProfileBtn">Сохранить изменения</button>
                <a href="index.html" class="btn-outline" id="cancelProfileBtn">Отмена</a>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>

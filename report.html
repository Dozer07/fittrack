<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FitTrack — отчёт</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><h3>FitTrack</h3></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-btn" id="navMain"><i class="fas fa-home"></i> Главная</a>
            <a href="workouts.html" class="sidebar-btn" id="navWorkouts"><i class="fas fa-dumbbell"></i> Тренировки</a>
            <a href="profile.html" class="sidebar-btn" id="navProfile"><i class="fas fa-user"></i> Профиль</a>
            <a href="settings.html" class="sidebar-btn" id="navSettings"><i class="fas fa-cog"></i> Настройки</a>
            <a href="report.html" class="sidebar-btn active" id="navReport"><i class="fas fa-chart-bar"></i> Отчёт</a>
            <button id="logoutBtn" class="sidebar-btn logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </nav>
    </aside>
    <main class="main-content">
        <div class="top-bar">
            <!-- <button id="langToggleBtn" class="lang-btn"><i class="fas fa-globe"></i> English</button> -->
            <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
        <div class="header">
            <h1 id="reportTitle">Отчёт о тренировках</h1>
            <div style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label id="startDateLabel">С:</label>
                    <input type="date" id="reportStartDate">
                    <label id="endDateLabel">По:</label>
                    <input type="date" id="reportEndDate">
                    <button id="generateReportBtn" class="btn-pdf"><i class="fas fa-chart-line"></i> Сформировать отчёт</button>
                </div>
                <button id="generatePdfBtn" class="btn-pdf"><i class="fas fa-file-pdf"></i> <span id="downloadPdfText">Скачать отчёт (PDF)</span></button>
            </div>
        </div>
        <div id="reportContent" class="report-container" style="display: none;">
            <div class="card" style="margin-bottom: 2rem;">
                <h2 id="statsSummaryTitle"><i class="fas fa-chart-line"></i> Общая статистика</h2>
                <div id="statsSummary" class="stats-summary" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem;"></div>
            </div>
            <div class="card" style="margin-bottom: 2rem;">
                <h2 id="reportProgressTitle"><i class="fas fa-calendar-week"></i> График калорий за период</h2>
                <canvas id="reportChart" width="400" height="200"></canvas>
            </div>
            <div class="card">
                <h2 id="workoutsListTitle"><i class="fas fa-list"></i> Список тренировок</h2>
                <div class="table-wrapper">
                    <table id="reportWorkoutsTable">
                        <thead>
                             <th id="thDate">Дата</th>
                             <th id="thName">Название</th>
                             <th id="thCategory">Категория</th>
                             <th id="thDuration">Длительность (мин)</th>
                             <th id="thCalories">Калории (ккал)</th>
                        </thead>
                        <tbody id="reportWorkoutsList"></tbody>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="script.js"></script>
</body>
</html>
